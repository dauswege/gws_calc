<h3>Warenkorb</h3>

@for (i of cartItems; track i.product.id) {
  <div style="margin-bottom: 10px;">
    <b>{{ i.product.name }}</b>

    <div>
      <button (click)="decrease(i.product.id)">-</button>

      <span style="margin: 0 10px;">
        {{ i.qty }}
      </span>

      <button (click)="increase(i.product.id)">+</button>
    </div>

    <div>
      Preis: {{ getPrice(i.product.id) * i.qty }} €
    </div>
  </div>

  <hr />

  <h3>Gesamt: {{ total }} €</h3>
