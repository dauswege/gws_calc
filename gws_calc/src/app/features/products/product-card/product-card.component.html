<div 
  class="product-card"
  [class.pressed]="isPressed()"
  (mousedown)="onMouseDown()"
  (mouseup)="onMouseUp()"
  (mouseleave)="onMouseUp()"
  (touchstart)="onTouchStart()"
  (touchend)="onTouchEnd()"
  (touchcancel)="onTouchCancel()"
  (click)="onClick()"
  role="button"
  tabindex="0"
  [attr.aria-label]="'Produkt ' + product().name + ', Preis ' + (product().price | currency) + (hasQuantity() ? ', bereits ' + quantity() + ' im Warenkorb' : '')">
  
  @if (hasQuantity()) {
    <div class="quantity-badge">{{ quantity() }}</div>
  }

  <div class="card-content">
    <h3 class="card-title">{{ product().name }}</h3>
    @if (product().price) {
      <div class="card-price">{{ product().price | currency }}</div>
    }
  </div>
</div>
