<div
  class="product-card"
  [class.pressed]="isPressed()"
  (mousedown)="onMouseDown()"
  (mouseup)="onMouseUp()"
  (mouseleave)="onMouseUp()"
  (touchstart)="onTouchStart()"
  (touchend)="onTouchEnd()"
  (touchcancel)="onTouchCancel()"
  (click)="onClick()"
  role="button"
  tabindex="0"
  [attr.aria-label]="'Produkt ' + product().name + ' hinzufügen oder länger drücken zum Entfernen'">

  <div class="card-header">
    <div>
      <h3 class="card-title">{{ product().name }} / {{getPrice(product()) | currency:'EUR' }}</h3>
      @if (product().description) {
        <p class="card-description">{{ product().description }}</p>
      }
    </div>
    @if (getPrice(product())) {
      <div class="card-price">{{ product().price | currency }}</div>
    }
  </div>

  <div class="card-interaction-hint">
    @if (isPressed()) {
      <span class="hint-long-press">Halten um zu entfernen...</span>
    } @else {
      <span class="hint-tap">Tippen zum Hinzufügen</span>
    }
  </div>
</div>
