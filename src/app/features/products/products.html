<div class="products-container">
  <div class="products-grid">
    @for (p of products; track p.id) {
      <app-product-card
        [product]="p"
        (select)="addToCart($event)"
        (remove)="removeFromCart($event)">
      </app-product-card>
    }
  </div>
</div>

@if (total > 0) {
  <div class="summary-bar">
    <div class="summary-info">
      <span class="summary-label">Gesamtpreis</span>
      <span class="summary-total">{{ total | currency }}</span>
    </div>
    <button class="btn-checkout" aria-label="Zur Kasse gehen">Checkout</button>
  </div>
}

<app-cart
  [items]="cartItems"
  [total]="total"
  (increase)="increase($event)"
  (decrease)="decrease($event)">
</app-cart>
