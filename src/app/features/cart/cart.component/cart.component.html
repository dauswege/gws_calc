@if (items().length > 0) {
  <div class="cart-container">
    <h2>Warenkorb</h2>

    <div>
      @for (item of items(); track item.product.id) {
        <div class="cart-item">
          <div class="cart-item-name">{{ item.product.name }}</div>

          <div class="cart-controls">
            <button class="btn-remove" (click)="decrease.emit(item.product.id)" aria-label="Menge verringern">
              −
            </button>

            <span>{{ item.qty }}</span>

            <button class="btn-add" (click)="increase.emit(item.product.id)" aria-label="Menge erhöhen">
              +
            </button>
          </div>

          <div class="cart-price">
            {{ getItemPrice(item) | currency }}
          </div>
        </div>
      }
    </div>

    <hr class="cart-divider" />

    <div class="cart-total">Gesamt: {{ total() | currency }}</div>
  </div>
}
